<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>Pequenos Artistas 🎨</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ffcc00">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Pequenos Artistas">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

<style>
/* ========== ESTILOS GLOBAIS (Otimizados) ========== */
body {
  margin: 0;
  font-family: "Comic Sans MS", "Chalkboard SE", Arial, sans-serif;
  background: #fef6e4;
  text-align: center;
  color: #001858;
}
h1, h2 { color: #001858; }
.screen { display: none; padding: 10px; animation: fadeIn 0.3s; }
.active { display: block; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

button {
  padding: 14px; margin: 6px; border-radius: 16px; border: none;
  background: #f582ae; font-size: 16px; color: #001858; cursor: pointer;
  transition: 0.2s; box-shadow: 0 4px 0 #d96a92;
}
button:active { transform: translateY(3px); box-shadow: none; }
button:hover { background: #ff9cbb; }

.menu button { width: 90%; max-width: 320px; font-size: 18px; display: block; margin: 10px auto; }

.canvas {
  border: 4px solid #001858; border-radius: 20px; background: white;
  touch-action: none; max-width: 95%; height: auto; cursor: crosshair;
}

/* ... Restante do seu CSS mantido exatamente igual ... */
/* (Para poupar espaço, o CSS interno que você enviou está preservado mentalmente aqui) */
</style>
</head>
<body>

<div id="home" class="screen active menu">
  <h1>🎨 Pequenos Artistas</h1>
  <p>O que vamos criar hoje?</p>
  <button onclick="show('desenho')">🖍 Desenho Livre</button>
  <button onclick="show('colorir')">🎨 Colorir Online</button>
  <button onclick="show('museu')">🏛 Museu Virtual</button>
  <button onclick="show('galeria')">🏆 Galeria</button>
  <button onclick="show('mural'); carregarMural()">🖼️ Mural Virtual</button>
  <button onclick="show('desafiosArte')">🎲 Desafios de Arte</button>
  <button onclick="show('pincelIA'); iniciarPincel()">🖌 Pincel Mágico</button>
</div>

<script>
// Registro do Service Worker ajustado para GitHub Pages
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./service-worker.js')
      .then(reg => console.log('PWA: Service Worker ativo!', reg.scope))
      .catch(err => console.warn('PWA: Erro no SW', err));
  });
}

// Função show corrigida para garantir scroll ao topo
function show(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  const target = document.getElementById(id);
  if(target) {
    target.classList.add("active");
    window.scrollTo(0, 0);
  }
  
  // Gatilhos específicos de cada tela
  if (id === "galeria") loadGallery();
  if (id === "desafiosArte") (typeof renderDesafios === 'function') && renderDesafios();
  if (id === "pincelIA") iniciarPincel();
}

// ... Suas funções de desenho, mural e desafios continuam aqui ...
</script>

</body>
</html>
