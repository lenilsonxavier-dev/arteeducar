<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Manifest e tema -->
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#4CAF50">

  <!-- PWA no mobile -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Pequenos Artistas">

  <title>Pequenos Artistas 🎨</title>

  <!-- CSS externo -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

  <!-- CSS interno -->
  <style>
    body {
      margin: 0;
      font-family: "Comic Sans MS", "Chalkboard SE", Arial, sans-serif;
      background: #fef6e4;
      text-align: center;
      color: #001858;
    }
    h1, h2 { color: #001858; }

    .screen { display: none; padding: 10px; animation: fadeIn 0.3s; }
    .active { display: block; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    button {
      padding: 14px; margin: 6px; border-radius: 16px; border: none;
      background: #f582ae; font-size: 16px; color: #001858; cursor: pointer;
      transition: 0.2s; box-shadow: 0 4px 0 #d96a92;
    }
    button:active { transform: translateY(3px); box-shadow: none; }
    button:hover { background: #ff9cbb; }
    .menu button { width: 90%; max-width: 320px; font-size: 18px; display: block; margin: 10px auto; }

    .canvas {
      border: 4px solid #001858; border-radius: 20px; background: white;
      touch-action: none; max-width: 95%; height: auto; cursor: crosshair;
    }
  </style>
</head>
<body>

<!-- Tela inicial -->
<div id="home" class="screen active menu">
  <h1>🎨 Pequenos Artistas</h1>
  <p>O que vamos criar hoje?</p>
  <button onclick="show('desenho')">🖍 Desenho Livre</button>
  <button onclick="show('colorir')">🎨 Colorir Online</button>
  <button onclick="show('museu')">🏛 Museu Virtual</button>
  <button onclick="show('galeria')">🏆 Galeria</button>
  <button onclick="show('mural'); carregarMural()">🖼️ Mural Virtual</button>
  <button onclick="show('desafiosArte')">🎲 Desafios de Arte</button>
  <button onclick="show('pincelIA'); iniciarPincel()">🖌 Pincel Mágico</button>
</div>

<!-- Outras telas (exemplo) -->
<div id="desenho" class="screen">
  <h2>Desenho Livre</h2>
  <canvas class="canvas" id="canvasDesenho"></canvas>
</div>

<div id="colorir" class="screen">
  <h2>Colorir Online</h2>
  <!-- conteúdo do colorir -->
</div>

<div id="museu" class="screen">
  <h2>Museu Virtual</h2>
  <!-- conteúdo do museu -->
</div>

<div id="galeria" class="screen">
  <h2>Galeria</h2>
  <!-- conteúdo da galeria -->
</div>

<div id="mural" class="screen">
  <h2>Mural Virtual</h2>
  <!-- conteúdo do mural -->
</div>

<div id="desafiosArte" class="screen">
  <h2>Desafios de Arte</h2>
  <!-- conteúdo dos desafios -->
</div>

<!-- Pincel Mágico -->
<div id="pincelIA" class="screen">
  <h2>Pincel Mágico</h2>
  <p>Use o mouse ou o dedo para pintar!</p>
  <canvas class="canvas" id="canvasPincel"></canvas>
  <br>
  <button onclick="clearCanvas()">Limpar</button>
  <label>Cor:
    <input type="color" id="corPincel" value="#f582ae">
  </label>
  <label>Tamanho:
    <input type="range" id="tamanhoPincel" min="1" max="30" value="5">
  </label>
</div>

<!-- Scripts -->
<script>
  // Registro do Service Worker
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./service-worker.js')
        .then(reg => console.log('PWA: Service Worker ativo!', reg.scope))
        .catch(err => console.warn('PWA: Erro no SW', err));
    });
  }

  // Função para trocar de tela
  function show(id) {
    document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
    const target = document.getElementById(id);
    if(target) {
      target.classList.add("active");
      window.scrollTo(0, 0);
    }

    // Funções específicas de cada tela
    if (id === "galeria") (typeof loadGallery === 'function') && loadGallery();
    if (id === "desafiosArte") (typeof renderDesafios === 'function') && renderDesafios();
    if (id === "pincelIA") (typeof iniciarPincel === 'function') && iniciarPincel();
    if (id === "mural") (typeof carregarMural === 'function') && carregarMural();
  }

  // Função Pincel Mágico
  function iniciarPincel() {
    const canvas = document.getElementById("canvasPincel");
    const ctx = canvas.getContext("2d");

    // Ajusta tamanho do canvas
    canvas.width = window.innerWidth * 0.95;
    canvas.height = 400;

    let desenhando = false;
    let ultimaX = 0;
    let ultimaY = 0;

    function startDraw(e) {
      desenhando = true;
      const pos = getPos(e);
      ultimaX = pos.x;
      ultimaY = pos.y;
    }

    function stopDraw() { desenhando = false; }

    function getPos(e) {
      if(e.touches) {
        return { x: e.touches[0].clientX - canvas.offsetLeft,
                 y: e.touches[0].clientY - canvas.offsetTop };
      } else {
        return { x: e.offsetX, y: e.offsetY };
      }
    }

    function draw(e) {
      if(!desenhando) return;
      const pos = getPos(e);
      ctx.strokeStyle = document.getElementById("corPincel").value;
      ctx.lineWidth = document.getElementById("tamanhoPincel").value;
      ctx.lineCap = "round";

      ctx.beginPath();
      ctx.moveTo(ultimaX, ultimaY);
      ctx.lineTo(pos.x, pos.y);
      ctx.stroke();

      ultimaX = pos.x;
      ultimaY = pos.y;
    }

    // Eventos mouse
    canvas.addEventListener("mousedown", startDraw);
    canvas.addEventListener("mouseup", stopDraw);
    canvas.addEventListener("mouseout", stopDraw);
    canvas.addEventListener("mousemove", draw);

    // Eventos toque
    canvas.addEventListener("touchstart", startDraw);
    canvas.addEventListener("touchend", stopDraw);
    canvas.addEventListener("touchcancel", stopDraw);
    canvas.addEventListener("touchmove", draw);
  }

  // Limpar canvas
  function clearCanvas() {
    const canvas = document.getElementById("canvasPincel");
    if(canvas) {
      const ctx = canvas.getContext("2d");
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
  }
</script>

</body>
</html>
