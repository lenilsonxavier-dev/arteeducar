<script>
// ========== LÓGICA DE ABERTURA ==========
(function() {
  const splash = document.getElementById('splash');
  const video = document.getElementById('splash-video');
  const fallback = document.getElementById('splash-fallback');

  function abrirApp() {
    if (splash && splash.style.display !== 'none') {
      splash.style.opacity = '0';
      setTimeout(() => {
        splash.style.display = 'none';
        show('home');
      }, 800);
    }
  }

  if (fallback) fallback.style.display = 'flex';

  video.load();

  video.addEventListener('loadeddata', () => {
    video.play().then(() => {
      if (fallback) {
        fallback.style.transition = "opacity 0.5s";
        fallback.style.opacity = '0';
      }
    }).catch(() => {
      console.log("Autoplay bloqueado ou erro no vídeo.");
    });
  });

  video.onended = abrirApp;

  setTimeout(() => {
    if (splash && splash.style.display !== 'none') {
      abrirApp();
    }
  }, 5000);

})();
<script>
// ========== LÓGICA DE ABERTURA ==========
(function() {
  const splash = document.getElementById('splash');
  const video = document.getElementById('splash-video');

  function abrirApp() {
    if (splash && splash.style.display !== 'none') {
      splash.style.opacity = '0';

      setTimeout(() => {
        splash.style.display = 'none';
        show('home');
      }, 800);
    }
  }

  video.onended = abrirApp;

  setTimeout(() => {
    if (splash && splash.style.display !== 'none') {
      abrirApp();
    }
  }, 5000);

})();


// ========== LIBERAR ÁUDIO + BOAS-VINDAS ==========
document.addEventListener('click', () => {

  falarComoPersonagem(
    "Bem-vindo, pequeno artista! Vamos criar algo lindo juntos?",
    "boas-vindas"
  );

}, { once: true });


// ========== ÁUDIO DO PERSONAGEM ==========
let audioAtual = null;

function falarComoPersonagem(texto, audioNome = null) {
  if (!audioNome) return;

  if (audioAtual) {
    audioAtual.pause();
    audioAtual.currentTime = 0;
  }

  const audio = new Audio('sons/' + audioNome + '.mp3');
  audio.preload = "auto";

  audio.onerror = () => {
    console.warn("Erro ao carregar áudio:", audioNome);
  };

  audio.play().catch(() => {
    console.warn("Erro ao tocar áudio:", audioNome);
  });

  audioAtual = audio;
}

// ========== FRASES ALEATÓRIAS ==========
const frases = [
  "Obaaa! Vamos criar arte!",
  "Que desenho incrível!",
  "Vamos tentar algo novo hoje?",
  "Estou adorando isso!"
];

function falarAleatorio() {
  const frase = frases[Math.floor(Math.random() * frases.length)];
  falarComoPersonagem(frase, "ia");
}

// ========== FUNÇÕES GLOBAIS ==========
function show(id) {
  const screens = document.querySelectorAll('.screen');

  screens.forEach(s => {
    s.style.display = 'none';
    s.classList.remove('active');
  });

  const target = document.getElementById(id);

  if (target) {
    target.style.display = (id === 'mural') ? 'flex' : 'block';
    target.classList.add('active');
  }

  // 🎤 FALAS DO PERSONAGEM
  if (id === "desenho") {
    setTimeout(() => {
      falarComoPersonagem(
        "Hora de soltar a criatividade. Vamos desenhar e colorir!",
        "desenho"
      );
    }, 300);
  }

  if (id === "galeria") {
    setTimeout(() => {
      falarComoPersonagem(
        "Olha só quanta arte linda você já fez! Que orgulho de você.",
        "galeria"
      );
    }, 300);
  }

  if (id === "desafiosArte") {
    setTimeout(() => {
      falarComoPersonagem(
        "Vamos escolher um desafio bem divertido! Mostre toda a criatividade.",
        "desafios-novo"
      );
    }, 300);
  }

  if (id === "mural") {
    setTimeout(() => {
      falarComoPersonagem(
        "Mural dos artistas. Veja as criações de todos e inspire-se.",
        "mural"
      );
    }, 300);
  }

  if (id === "pincelIA") {
    setTimeout(() => {
      falarComoPersonagem(
        "Olá! Eu sou o pincel mágico. Vou te guiar em sua jornada pelo mundo da Arte!",
        "pincel-novo"
      );
    }, 300);
  }
}
</script>
