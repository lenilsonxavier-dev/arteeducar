<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noite Estrelada Educativo</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@500&display=swap');

body{
  margin:0;
  overflow:hidden;
  background:#000;
  font-family:'Fredoka', sans-serif;
}

#game{position:fixed;inset:0;}
canvas{width:100%;height:100%;display:block;}

#hud{
 position:absolute;
 top:10px;left:160px;right:10px;
 display:flex;justify-content:space-between;
 color:#FFD700;font-size:22px;
}

#regras{
 position:absolute;
 left:10px;
 top:80px;
 color:#FFD700;
 font-size:20px;
 display:flex;
 flex-direction:column;
 gap:16px;
}

#controles{
 position:absolute;
 bottom:20px;
 left:160px;
 right:0;
 display:flex;
 justify-content:space-between;
 padding:0 20px;
}

.btn{
 width:75px;height:75px;border-radius:50%;
 background:rgba(255,255,255,0.2);
 display:flex;align-items:center;justify-content:center;
 color:#fff;font-size:28px;
}

.overlay{
 position:absolute;inset:0;
 background:radial-gradient(#0b1a2f,#000);
 display:flex;flex-direction:column;
 align-items:center;justify-content:center;
 text-align:center;
}

.overlay h1{
 color:#FFD700;
 text-shadow:0 0 20px rgba(255,215,0,0.8);
}

.overlay p{color:#fff;}

button{
 padding:15px 30px;
 border-radius:30px;
 background:#FFD700;
 border:none;
 font-size:20px;
}
</style>
</head>

<body>

<div id="game">

<div id="hud">
<div>🌌 Noite Estrelada</div>
<div>❤️ <span id="vidas">7</span></div>
</div>

<div id="regras">
<div>🔴 -2 vidas</div>
<div>💙 +1 vida</div>
</div>

<canvas id="c"></canvas>

<div id="controles">
<div class="btn" id="left">⬅</div>
<div class="btn" id="right">➡</div>
</div>

<div id="start" class="overlay">
<h1>🌌 A Noite Estrelada de Van Gogh</h1>
<p>Ajude o artista a pintar o céu!</p>
<p>💙 Pegue as estrelas azuis<br>🔴 Desvie das vermelhas</p>
<button onclick="start()">🎮 INICIAR</button>
</div>

<div id="end" class="overlay" style="display:none">
<h2 id="msg"></h2>
<button onclick="location.reload()">REINICIAR</button>
</div>

</div>

<script>

const canvas=document.getElementById("c");
const ctx=canvas.getContext("2d");

function resize(){
 canvas.width=innerWidth;
 canvas.height=innerHeight;
}
resize();
window.onresize=resize;

// imagens
const bg=new Image();
bg.src="https://raw.githubusercontent.com/lenilsonxavier-dev/pequenosartistaspwa/main/jogos%20assets/noitestreladacenario.jpg";

const hero=new Image();
hero.src="https://raw.githubusercontent.com/lenilsonxavier-dev/pequenosartistaspwa/main/jogos%20assets/vangoghroblox.png";

const starNormal1=new Image();
starNormal1.src="https://raw.githubusercontent.com/lenilsonxavier-dev/pequenosartistaspwa/main/jogos%20assets/estrelacaindo3.png";

const starNormal2=new Image();
starNormal2.src="https://raw.githubusercontent.com/lenilsonxavier-dev/pequenosartistaspwa/main/jogos%20assets/estrelacaind04.png";

const starBlue=new Image();
starBlue.src="https://raw.githubusercontent.com/lenilsonxavier-dev/pequenosartistaspwa/main/jogos%20assets/vanazul.png";

const starRed=new Image();
starRed.src="https://raw.githubusercontent.com/lenilsonxavier-dev/pequenosartistaspwa/main/jogos%20assets/vanverm.png";

// música
const music=new Audio("https://raw.githubusercontent.com/lenilsonxavier-dev/pequenosartistaspwa/main/jogos%20assets/noiteestreladamusica.mp3");
music.loop=true;

// player
let x=canvas.width/2;
let speed=0,left=false,right=false;

// jogo
let stars=[];
let vidas=7;
let playing=false;
let piscando=0;
let tempoSpawn=0;
let t=0;

// start
function start(){
 document.getElementById("start").style.display="none";
 playing=true;
 music.play().catch(()=>{});
 loop();
}

// ⭐ spawn com tamanho variável
function spawn(){
 let r=Math.random();
 let tipo="normal";

 if(r<0.2) tipo="azul";
 else if(r<0.4) tipo="vermelha";

 let tamanho = 30 + Math.random()*25;

 let img = (tipo==="azul") ? starBlue :
           (tipo==="vermelha") ? starRed :
           (Math.random()>0.5?starNormal1:starNormal2);

 stars.push({
   x:220 + Math.random()*(canvas.width-260),
   y:-50,
   speed:3+Math.random()*4,
   drift:(Math.random()-0.5)*2,
   tipo,
   img,
   size:tamanho
 });
}

function spawnControlado(){
 tempoSpawn++;
 if(tempoSpawn>35){
   spawn();
   tempoSpawn=0;
 }
}

// ⭐ desenho com pulsação proporcional
function drawStar(s){

 let pulse = Math.sin(t*0.1)*3;
 let size = s.size + pulse;

 if(s.tipo==="azul"){
   ctx.shadowBlur=25;
   ctx.shadowColor="cyan";
 }

 if(s.tipo==="vermelha"){
   ctx.shadowBlur=30;
   ctx.shadowColor="red";
 }

 ctx.drawImage(s.img,s.x-size/2,s.y-size/2,size,size);

 ctx.shadowBlur=0;
}

// loop
function loop(){
 if(!playing) return;

 t++;

 ctx.drawImage(bg,0,0,canvas.width,canvas.height);

 if(left) speed-=0.6;
 if(right) speed+=0.6;
 speed*=0.92;
 x+=speed;

 x=Math.max(220,Math.min(canvas.width-80,x));

 if(piscando>0){
   if(piscando%10<5) ctx.globalAlpha=0.3;
   piscando--;
 }

 ctx.drawImage(hero,x-70,canvas.height-180,140,170);
 ctx.globalAlpha=1;

 spawnControlado();

 for(let i=stars.length-1;i>=0;i--){
   let s=stars[i];

   s.y+=s.speed;
   s.x+=s.drift;

   drawStar(s);

   if(s.y > canvas.height + 50){
     stars.splice(i,1);
     continue;
   }

   // colisão com tamanho real
   let heroTop = canvas.height - 180;
   let heroBottom = canvas.height - 20;
   let heroLeft = x - 50;
   let heroRight = x + 50;

   let starSize = s.size;

   let starTop = s.y - starSize/2;
   let starBottom = s.y + starSize/2;
   let starLeft = s.x - starSize/2;
   let starRight = s.x + starSize/2;

   if(
     starRight > heroLeft &&
     starLeft < heroRight &&
     starBottom > heroTop &&
     starTop < heroBottom
   ){
     stars.splice(i,1);

     if(s.tipo==="azul"){
       vidas += 1;
     }
     else if(s.tipo==="vermelha"){
       vidas -= 2;
     }
     else{
       vidas -= 1;
     }

     piscando = 30;

     vidas=Math.max(0,Math.min(vidas,10));
     document.getElementById("vidas").innerText=vidas;

     if(vidas<=0){
       end();
     }
   }
 }

 requestAnimationFrame(loop);
}

// controles
document.getElementById("left").onpointerdown=()=>left=true;
document.getElementById("left").onpointerup=()=>left=false;

document.getElementById("right").onpointerdown=()=>right=true;
document.getElementById("right").onpointerup=()=>right=false;

window.onkeydown=e=>{
 if(e.key==="ArrowLeft") left=true;
 if(e.key==="ArrowRight") right=true;
};

window.onkeyup=e=>{
 if(e.key==="ArrowLeft") left=false;
 if(e.key==="ArrowRight") right=false;
};

// fim
function end(){
 playing=false;
 music.pause();
 document.getElementById("end").style.display="flex";
 document.getElementById("msg").innerText="💛 Continue tentando!";
}

</script>

</body>
</html>
