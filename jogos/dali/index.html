<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DALÍ - VITÓRIA SURREAL</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{overflow:hidden;background:#000;}

#jogo-container{
    position:relative;
    width:100vw;
    height:100vh;
    background:#000;
}

#dali-player{
    position:absolute;
    bottom:15%;
    width:120px;
    height:160px;
    background:url('https://i.imgur.com/Xw2AxIR.png') no-repeat center;
    background-size:contain;
    filter:drop-shadow(0 0 10px white);
}

canvas{position:absolute;width:100%;height:100%;}

.overlay{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.9);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    color:#fff;
}

.img-resultado{
    width:280px;
    margin-bottom:20px;
}
</style>
</head>

<body>

<div id="jogo-container">

<div id="dali-player"></div>
<canvas id="gameCanvas"></canvas>

<div id="tela-start" class="overlay">
    <h1>DALÍ</h1>
    <button onclick="iniciar()">INICIAR</button>
</div>

<div id="tela-fim" class="overlay" style="display:none">
    <img id="img-fim" class="img-resultado">
    <h1 id="titulo-fim"></h1>
    <button onclick="location.reload()">RECOMEÇAR</button>
</div>

</div>

<script>
const canvas=document.getElementById("gameCanvas");
const ctx=canvas.getContext("2d");
const dali=document.getElementById("dali-player");

function resize(){
    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;
}
resize();
window.onresize=resize;

let ativo=false,pontuacao=0,tempo=300,posX=window.innerWidth/2;
let gotas=[],corMistura=null,missaoAtual={};

const IMG_VITORIA="https://i.imgur.com/Udvljf9.png";
const IMG_DERROTA="https://i.imgur.com/ieI69T8.png";

const musicaFundo=new Audio("sons/musicadojogo.mp3");
musicaFundo.loop=true;

function tocarSom(src){
    let s=new Audio(src);
    s.play().catch(()=>{});
}

function novaMissao(){
    const m=[
        {n:"VERDE",c:"green"},
        {n:"LARANJA",c:"orange"},
        {n:"ROXO",c:"purple"}
    ];
    missaoAtual=m[Math.floor(Math.random()*m.length)];
}

function iniciar(){
    document.getElementById("tela-start").style.display="none";
    ativo=true;
    novaMissao();

    musicaFundo.play().catch(()=>{});

    requestAnimationFrame(loop);

    setInterval(()=>{if(ativo&&tempo>0)tempo--;},1000);
    setInterval(()=>{if(ativo)spawn();},1300);
}

window.onkeydown=e=>{
    if(e.key==="ArrowLeft")posX-=15;
    if(e.key==="ArrowRight")posX+=15;
};

function spawn(){
    const cores={
        vermelho:"red",
        azul:"blue",
        amarelo:"yellow"
    };
    const nomes=Object.keys(cores);
    const nome=nomes[Math.floor(Math.random()*nomes.length)];

    gotas.push({
        x:50+Math.random()*(canvas.width-100),
        y:80,
        nome:nome,
        cor:cores[nome],
        vel:5
    });
}

function loop(){
    if(!ativo)return;

    ctx.clearRect(0,0,canvas.width,canvas.height);

    posX=Math.max(60,Math.min(canvas.width-60,posX));
    dali.style.left=(posX-60)+"px";

    for(let i=gotas.length-1;i>=0;i--){
        let g=gotas[i];
        g.y+=g.vel;

        ctx.beginPath();
        ctx.strokeStyle=g.cor;
        ctx.lineWidth=6;
        ctx.ellipse(g.x,g.y,25,18,0,0,Math.PI*2);
        ctx.stroke();

        if(Math.hypot(g.x-posX,g.y-(canvas.height-180))<85){
            coletar(g.nome,g.cor);
            gotas.splice(i,1);
        }else if(g.y>canvas.height){
            gotas.splice(i,1);
        }
    }

    if(pontuacao>=120)fim("VITÓRIA!",IMG_VITORIA);
    if(tempo<=0)fim("GAME OVER",IMG_DERROTA);

    requestAnimationFrame(loop);
}

function coletar(n,c){
    if(!corMistura){
        corMistura=n;
        dali.style.filter=`drop-shadow(0 0 15px ${c})`;
    }else{
        let p=[corMistura,n].sort().join("+");

        const receitas={
            "amarelo+azul":"VERDE",
            "amarelo+vermelho":"LARANJA",
            "azul+vermelho":"ROXO"
        };

        if(receitas[p]===missaoAtual.n){
            pontuacao+=10;
            tocarSom("sons/pontodali.mp3");
            dali.style.filter=`drop-shadow(0 0 25px ${missaoAtual.c})`;
            novaMissao();
            corMistura=null;
        }else{
            corMistura=null;
            dali.style.filter="drop-shadow(0 0 10px white)";
        }
    }
}

function fim(txt,img){
    ativo=false;
    musicaFundo.pause();

    document.getElementById("tela-fim").style.display="flex";
    document.getElementById("titulo-fim").innerText=txt;
    document.getElementById("img-fim").src=img;

    if(txt.includes("VITÓRIA")){
        tocarSom("sons/dalivictoria.mp3");
    }else{
        tocarSom("sons/dalimorte.mp3");
    }
}
</script>

</body>
</html>
