<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dalí - Vitória Surreal</title>

<style>
body,html{
  margin:0;
  padding:0;
  overflow:hidden;
  background:#000;
}

#jogo-container{
  width:100vw;
  height:100vh;
  position:relative;
  background:url('https://raw.githubusercontent.com/lenilsonxavier-dev/pequenosartistaspwa/main/jogos/salvador2.jpg') center/cover;
}

canvas{
  position:absolute;
  width:100%;
  height:100%;
}

#dali{
  position:absolute;
  bottom:15%;
  width:120px;
  height:160px;
  background:url('https://raw.githubusercontent.com/lenilsonxavier-dev/pequenosartistaspwa/main/jogos%20assets/salvador1.png') center/contain no-repeat;
}

.overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.9);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  color:#fff;
}

button{
  padding:15px 40px;
  font-size:20px;
  background:#f1c40f;
  border:none;
  border-radius:30px;
}
</style>
</head>

<body>

<div id="jogo-container">

<div id="dali"></div>
<canvas id="canvas"></canvas>

<div id="start" class="overlay">
  <h1>🎨 DALÍ</h1>
  <button onclick="iniciar()">INICIAR</button>
</div>

<div id="fim" class="overlay" style="display:none">
  <img id="img" width="250">
  <h2 id="txt"></h2>
  <button onclick="location.reload()">RECOMEÇAR</button>
</div>

</div>

<script>

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");
const dali=document.getElementById("dali");

canvas.width=innerWidth;
canvas.height=innerHeight;

let x=innerWidth/2;
let gotas=[];
let pontos=0;
let ativo=false;

// 🎵 sons corrigidos
const musica=new Audio("https://raw.githubusercontent.com/lenilsonxavier-dev/pequenosartistaspwa/main/jogos%20assets/Walen%20-%20Gameboy%20(freetouse.com).mp3");
musica.loop=true;

const somStart="https://raw.githubusercontent.com/lenilsonxavier-dev/pequenosartistaspwa/main/jogos%20assets/dalicome%C3%A7o.mp3";
const somPonto="https://raw.githubusercontent.com/lenilsonxavier-dev/pequenosartistaspwa/main/jogos%20assets/dalieste.mp3";
const somWin="https://raw.githubusercontent.com/lenilsonxavier-dev/pequenosartistaspwa/main/jogos%20assets/dalivictoria.mp3";
const somLose="https://raw.githubusercontent.com/lenilsonxavier-dev/pequenosartistaspwa/main/jogos%20assets/dalimorte.mp3";

// imagens
const imgWin="https://raw.githubusercontent.com/lenilsonxavier-dev/pequenosartistaspwa/main/jogos%20assets/dalivitoria.png";
const imgLose="https://raw.githubusercontent.com/lenilsonxavier-dev/pequenosartistaspwa/main/jogos%20assets/dalimorto.png";

function som(url){
  new Audio(url).play().catch(()=>{});
}

function iniciar(){
  document.getElementById("start").style.display="none";
  ativo=true;
  musica.play().catch(()=>{});
  som(somStart);
  loop();
  setInterval(spawn,1200);
}

function spawn(){
  gotas.push({
    x:Math.random()*canvas.width,
    y:0
  });
}

function loop(){
  if(!ativo) return;

  ctx.clearRect(0,0,canvas.width,canvas.height);

  dali.style.left=(x-60)+"px";

  for(let i=gotas.length-1;i>=0;i--){
    let g=gotas[i];
    g.y+=5;

    ctx.fillStyle="red";
    ctx.beginPath();
    ctx.arc(g.x,g.y,12,0,Math.PI*2);
    ctx.fill();

    if(Math.abs(g.x-x)<50 && g.y>canvas.height-200){
      pontos++;
      som(somPonto);
      gotas.splice(i,1);
    }

    if(g.y>canvas.height){
      gotas.splice(i,1);
    }
  }

  if(pontos>=20){
    fim(true);
  }

  requestAnimationFrame(loop);
}

window.onkeydown=(e)=>{
  if(e.key==="ArrowLeft") x-=15;
  if(e.key==="ArrowRight") x+=15;
};

function fim(win){
  ativo=false;
  musica.pause();

  document.getElementById("fim").style.display="flex";

  if(win){
    document.getElementById("txt").innerText="🏆 VITÓRIA!";
    document.getElementById("img").src=imgWin;
    som(somWin);
  }else{
    document.getElementById("txt").innerText="💀 FIM DE JOGO";
    document.getElementById("img").src=imgLose;
    som(somLose);
  }
}

</script>

</body>
</html>
