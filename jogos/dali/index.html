<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>DALÍ - MISTURA SURREAL | Toque nas Gotas</title>

<style>
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }

#jogo-container { 
    position: relative; width: 100vw; height: 100vh; 
    background: #000 url('https://i.imgur.com/YnLT6qV.jpeg') no-repeat center;
    background-size: cover;
    touch-action: none;
}

canvas { display: block; width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 10; }

#hud-top { 
    position: absolute; top: 0; width: 100%; background: rgba(0, 0, 0, 0.85); 
    padding: 12px 20px; display: flex; justify-content: space-between; align-items: center;
    color: #f1c40f; font-weight: 700; text-transform: uppercase; z-index: 150;
    border-bottom: 2px solid #f1c40f; pointer-events: none;
    font-size: clamp(14px, 5vw, 22px);
}

#dali-player {
    position: absolute; bottom: 12%; width: 100px; height: 140px;
    background: url('https://i.imgur.com/Xw2AxIR.png') no-repeat center;
    background-size: contain; z-index: 20; pointer-events: none;
    filter: drop-shadow(0 0 10px white);
    transition: filter 0.1s ease;
}

.overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; z-index: 2000; text-align: center; padding: 20px; }

.img-resultado {
    width: 260px; max-width: 80%;
    border-radius: 20px; border: 4px solid #f1c40f; margin-bottom: 20px;
    box-shadow: 0 0 30px rgba(241,196,15,0.5);
}

button { padding: 16px 40px; font-size: 20px; background: #f1c40f; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; color: #000; transition: 0.05s linear; }
button:active { transform: scale(0.96); }

/* Instrução mobile */
.instrucao {
    position: absolute;
    bottom: 25px;
    left: 0;
    right: 0;
    text-align: center;
    color: rgba(255,255,200,0.8);
    background: rgba(0,0,0,0.5);
    padding: 8px;
    font-size: 14px;
    z-index: 100;
    pointer-events: none;
}

@media (max-width: 700px) {
    #dali-player { width: 75px; height: 105px; bottom: 10%; }
    .instrucao { font-size: 11px; }
}
</style>
</head>
<body>

<div id="jogo-container">

<div id="hud-top">
    <div>🎨 MISTURE: <span id="cor-alvo">VERDE</span></div>
    <div>✨ <span id="pts">0</span>/12 | ⏱️ <span id="timer">03:00</span></div>
</div>

<div id="dali-player"></div>
<canvas id="gameCanvas"></canvas>
<div class="instrucao">💧 TOQUE NAS GOTAS para coletar | 🖱️ Setas do teclado movem Dalí</div>

<div id="tela-start" class="overlay">
    <h1>SALVADOR DALÍ</h1>
    <p style="margin: 10px 0; font-size: 18px;">💡 Misture duas gotas para formar a cor pedida!<br>
    ⚠️ Se errar a mistura, você PERDE 5 PONTOS.<br>
    👆 Toque diretamente nas gotas para pegá-las.</p>
    <button id="btn-iniciar">🌠 INICIAR 🌠</button>
</div>

<div id="tela-fim" class="overlay" style="display:none">
    <img id="img-fim" class="img-resultado">
    <h1 id="titulo-fim"></h1>
    <button onclick="location.reload()">🔁 RECOMEÇAR</button>
</div>

</div>

<script>
// ==================== SONS COM WEB AUDIO API ====================
let audioCtx = null;
let musicaAtual = null;

function initAudio() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    audioCtx.resume();
}

function tocarBeep(freq, duracao, volume = 0.3, tipo = 'sine') {
    if (!audioCtx) {
        initAudio();
        if (!audioCtx) return;
    }
    const now = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.frequency.value = freq;
    osc.type = tipo;
    gain.gain.setValueAtTime(volume, now);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + duracao);
    osc.start();
    osc.stop(now + duracao);
}

function somColeta() { tocarBeep(880, 0.12, 0.25); setTimeout(() => tocarBeep(1046.5, 0.15, 0.25), 80); }
function somErro() { tocarBeep(220, 0.12, 0.3, 'sawtooth'); } // perda de pontos
function somGotaPega() { tocarBeep(659.25, 0.07, 0.18, 'sine'); }
function somVitoria() { [523.25, 659.25, 783.99, 1046.5].forEach((f,i)=>setTimeout(()=>tocarBeep(f,0.3,0.3), i*180)); }
function somDerrota() { [440, 349.23, 293.66, 220].forEach((f,i)=>setTimeout(()=>tocarBeep(f,0.4,0.3,'sawtooth'), i*250)); }
function somStart() { tocarBeep(523.25,0.15); setTimeout(()=>tocarBeep(659.25,0.15),100); setTimeout(()=>tocarBeep(783.99,0.2),200); }

function tocarMusicaFundo() {
    if (musicaAtual) { musicaAtual.pause(); musicaAtual = null; }
    musicaAtual = new Audio("https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3");
    musicaAtual.loop = true;
    musicaAtual.volume = 0.2;
    musicaAtual.play().catch(()=>console.warn("Música opcional não carregou"));
}
function pararMusicaFundo() { if (musicaAtual) { musicaAtual.pause(); musicaAtual.currentTime = 0; } }

// ==================== JOGO ====================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const dali = document.getElementById('dali-player');

let ativo = false;
let pontuacao = 0;          // pontos totais (cada acerto soma 10)
let tempo = 180;            // 3 minutos
let posX = window.innerWidth / 2;
let gotas = [];
let corMistura = null;      // cor da primeira gota coletada
let missaoAtual = {};
let movEsq = false, movDir = false;
let spawnInterval = null, timerInterval = null, animFrame = null;

const IMG_VITORIA = "https://i.imgur.com/Udvljf9.png";
const IMG_DERROTA = "https://i.imgur.com/ieI69T8.png";

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    if (ativo) {
        posX = Math.min(Math.max(posX, 70), canvas.width - 70);
        dali.style.left = (posX - 50) + 'px';
    }
}
window.addEventListener('resize', resizeCanvas);

function novaMissao() {
    const missoes = [
        { nome: 'VERDE', cor: 'rgb(0,255,0)' },
        { nome: 'LARANJA', cor: 'rgb(255,165,0)' },
        { nome: 'ROXO', cor: 'rgb(128,0,128)' }
    ];
    missaoAtual = missoes[Math.floor(Math.random() * missoes.length)];
    document.getElementById('cor-alvo').innerText = missaoAtual.nome;
    document.getElementById('cor-alvo').style.color = missaoAtual.cor;
}

function atualizarUI() {
    document.getElementById('pts').innerText = Math.floor(pontuacao / 10);
    let m = Math.floor(tempo / 60);
    let s = tempo % 60;
    document.getElementById('timer').innerText = `${m}:${s < 10 ? '0'+s : s}`;
}

function spawnGota() {
    if (!ativo) return;
    const cores = {
        vermelho: "rgb(255,0,0)",
        azul: "rgb(0,0,255)",
        amarelo: "rgb(255,255,0)"
    };
    const nomes = Object.keys(cores);
    const nome = nomes[Math.floor(Math.random() * nomes.length)];
    const x = 40 + Math.random() * (canvas.width - 80);
    gotas.push({
        x: x, y: 70, nome: nome, cor: cores[nome], vel: 4.8,
        id: Math.random()  // identificador para toque
    });
}

// Função para tentar coletar uma gota específica (por toque ou clique)
function tentarColetarGota(gota) {
    if (!ativo) return false;
    
    // Distância do Dalí até a gota
    const daliX = posX;
    const daliY = canvas.height - 120;
    const dx = Math.abs(gota.x - daliX);
    const dy = Math.abs(gota.y - daliY);
    if (dx > 65 || dy > 70) return false;  // muito longe
    
    // Efeito sonoro ao pegar qualquer gota
    somGotaPega();
    
    if (!corMistura) {
        // Primeira gota
        corMistura = gota.nome;
        dali.style.filter = `drop-shadow(0 0 15px ${gota.cor})`;
        return true;
    } else {
        // Segunda gota: tentar misturar
        const par = [corMistura, gota.nome].sort().join('+');
        const receitas = {
            'amarelo+azul': 'VERDE',
            'amarelo+vermelho': 'LARANJA',
            'azul+vermelho': 'ROXO'
        };
        const resultado = receitas[par];
        
        if (resultado === missaoAtual.nome) {
            // ACERTOU
            pontuacao += 10;
            atualizarUI();
            somColeta();
            dali.style.filter = `drop-shadow(0 0 25px ${missaoAtual.cor})`;
            novaMissao();
            corMistura = null;
            setTimeout(() => { if (ativo) dali.style.filter = `drop-shadow(0 0 10px white)`; }, 200);
            return true;
        } else {
            // ERROU: perde 5 pontos (não fica negativo)
            pontuacao = Math.max(0, pontuacao - 5);
            atualizarUI();
            somErro();
            corMistura = null;
            dali.style.filter = `drop-shadow(0 0 10px white)`;
            return true;
        }
    }
}

// Detecção de toque/clique nas gotas
function handleCanvasTap(e) {
    if (!ativo) return;
    e.preventDefault();
    
    // Obtém coordenadas do toque/clique relativo ao canvas
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    
    let clientX, clientY;
    if (e.touches) {
        clientX = e.touches[0].clientX;
        clientY = e.touches[0].clientY;
    } else {
        clientX = e.clientX;
        clientY = e.clientY;
    }
    
    const canvasX = (clientX - rect.left) * scaleX;
    const canvasY = (clientY - rect.top) * scaleY;
    
    // Percorre as gotas de trás para frente (a mais recente primeiro)
    for (let i = gotas.length-1; i >= 0; i--) {
        const g = gotas[i];
        // Raio aproximado da gota (30px)
        const dist = Math.hypot(canvasX - g.x, canvasY - g.y);
        if (dist < 35) {
            const sucesso = tentarColetarGota(g);
            if (sucesso) {
                gotas.splice(i, 1);
                break;
            }
        }
    }
}

canvas.addEventListener('touchstart', handleCanvasTap);
canvas.addEventListener('mousedown', handleCanvasTap);

// Movimento do Dalí (setas do teclado)
window.addEventListener('keydown', (e) => {
    if (!ativo) return;
    if (e.key === 'ArrowLeft') { e.preventDefault(); movEsq = true; }
    if (e.key === 'ArrowRight') { e.preventDefault(); movDir = true; }
});
window.addEventListener('keyup', (e) => {
    if (e.key === 'ArrowLeft') movEsq = false;
    if (e.key === 'ArrowRight') movDir = false;
});

// Loop de animação e movimento automático do Dalí
function loop() {
    if (!ativo) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Movimento do Dalí (teclado)
    if (movEsq) posX -= 10;
    if (movDir) posX += 10;
    posX = Math.max(70, Math.min(canvas.width - 70, posX));
    dali.style.left = (posX - 50) + 'px';
    
    // Atualiza e desenha gotas
    for (let i = 0; i < gotas.length; i++) {
        const g = gotas[i];
        g.y += g.vel;
        
        // Desenha gota com brilho
        ctx.shadowBlur = 12;
        ctx.shadowColor = g.cor;
        ctx.beginPath();
        ctx.fillStyle = g.cor;
        ctx.ellipse(g.x, g.y, 22, 16, 0, 0, Math.PI*2);
        ctx.fill();
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.shadowBlur = 0;
        
        // Remove gotas que saíram da tela
        if (g.y > canvas.height + 80) {
            gotas.splice(i,1);
            i--;
        }
    }
    
    // Verifica fim de jogo
    if (pontuacao >= 120) fimJogo(true);
    if (tempo <= 0) fimJogo(false);
    
    animFrame = requestAnimationFrame(loop);
}

function iniciarJogo() {
    initAudio();
    audioCtx?.resume();
    
    document.getElementById('tela-start').style.display = 'none';
    
    if (spawnInterval) clearInterval(spawnInterval);
    if (timerInterval) clearInterval(timerInterval);
    if (animFrame) cancelAnimationFrame(animFrame);
    
    ativo = true;
    pontuacao = 0;
    tempo = 180;
    gotas = [];
    corMistura = null;
    movEsq = false; movDir = false;
    posX = window.innerWidth / 2;
    dali.style.left = (posX - 50) + 'px';
    dali.style.filter = 'drop-shadow(0 0 10px white)';
    
    resizeCanvas();
    novaMissao();
    atualizarUI();
    
    somStart();
    pararMusicaFundo();
    tocarMusicaFundo();
    
    spawnInterval = setInterval(() => spawnGota(), 1100);
    timerInterval = setInterval(() => {
        if (ativo && tempo > 0) {
            tempo--;
            atualizarUI();
        }
    }, 1000);
    animFrame = requestAnimationFrame(loop);
}

function fimJogo(vitoria) {
    if (!ativo) return;
    ativo = false;
    if (spawnInterval) clearInterval(spawnInterval);
    if (timerInterval) clearInterval(timerInterval);
    if (animFrame) cancelAnimationFrame(animFrame);
    pararMusicaFundo();
    
    const telaFim = document.getElementById('tela-fim');
    const imgFim = document.getElementById('img-fim');
    const tituloFim = document.getElementById('titulo-fim');
    telaFim.style.display = 'flex';
    
    if (vitoria) {
        tituloFim.innerText = "✨ A VITÓRIA É SURREAL! ✨";
        imgFim.src = IMG_VITORIA;
        somVitoria();
    } else {
        tituloFim.innerText = "⏰ O TEMPO ESCORREU...";
        imgFim.src = IMG_DERROTA;
        somDerrota();
    }
}

// Botão iniciar
document.getElementById('btn-iniciar').addEventListener('click', () => iniciarJogo());

// Desbloqueia áudio no primeiro toque
function unlockAudio() {
    initAudio();
    if (audioCtx) audioCtx.resume();
    document.body.removeEventListener('touchstart', unlockAudio);
    document.body.removeEventListener('click', unlockAudio);
}
document.body.addEventListener('touchstart', unlockAudio);
document.body.addEventListener('click', unlockAudio);

// Previne arrastar
document.querySelectorAll('img, canvas').forEach(el => el.addEventListener('dragstart', e => e.preventDefault()));
</script>
</body>
</html>
