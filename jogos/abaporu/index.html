<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quebra-Cabeça - Abaporu</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background: linear-gradient(#0b2a1f,#1a4a2e);
  color:#ffebcd;
  text-align:center;
}

.puzzle-container {
  position:relative;
  margin:20px auto;
  width:600px;
  height:480px;
  border:6px solid #d4a017;
}

.piece {
  position:absolute;
  background-size:cover;
  cursor:grab;
}
</style>
</head>

<body>

<h2>🖼️ Abaporu - Quebra-Cabeça</h2>
<p>Tempo: <span id="timer">0</span>s</p>

<div id="puzzle" class="puzzle-container"></div>

<button onclick="reiniciar()">🔄 Reiniciar</button>

<script>

const imgSrc = "../assets/imagens/abaporu.jpeg";

let cols=3, rows=4;
let pieceW=200, pieceH=160;
let pieces=[];
let tempo=0;

function iniciarTimer(){
  tempo=0;
  setInterval(()=>{
    tempo++;
    document.getElementById('timer').textContent=tempo;
  },1000);
}

function criar(){
  const cont=document.getElementById('puzzle');
  cont.innerHTML="";
  pieces=[];

  for(let y=0;y<rows;y++){
    for(let x=0;x<cols;x++){

      let p=document.createElement('div');
      p.className="piece";

      p.style.width=pieceW+"px";
      p.style.height=pieceH+"px";

      p.style.backgroundImage=`url(${imgSrc})`;
      p.style.backgroundPosition=`-${x*pieceW}px -${y*pieceH}px`;
      p.style.backgroundSize=`${cols*pieceW}px ${rows*pieceH}px`;

      p.style.left=Math.random()*300+"px";
      p.style.top=Math.random()*200+"px";

      p.dataset.cx=x*pieceW;
      p.dataset.cy=y*pieceH;

      p.onmousedown=dragStart;

      cont.appendChild(p);
      pieces.push(p);
    }
  }
}

let drag=null, offsetX, offsetY;

function dragStart(e){
  drag=e.target;
  offsetX=e.offsetX;
  offsetY=e.offsetY;

  document.onmousemove=dragMove;
  document.onmouseup=drop;
}

function dragMove(e){
  if(!drag) return;

  let cont=document.getElementById('puzzle').getBoundingClientRect();

  drag.style.left=(e.clientX-cont.left-offsetX)+"px";
  drag.style.top=(e.clientY-cont.top-offsetY)+"px";
}

function drop(){
  if(!drag) return;

  let x=parseFloat(drag.style.left);
  let y=parseFloat(drag.style.top);

  if(Math.abs(x-drag.dataset.cx)<30 && Math.abs(y-drag.dataset.cy)<30){
    drag.style.left=drag.dataset.cx+"px";
    drag.style.top=drag.dataset.cy+"px";
  }

  drag=null;
}

function reiniciar(){
  criar();
}

window.onload=()=>{
  criar();
  iniciarTimer();
}

</script>

</body>
</html>
