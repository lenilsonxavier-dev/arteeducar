<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Van Gogh - Campo de Trigo | Salto Prolongado</title>

<style>
/* (SEU CSS ORIGINAL — NÃO ALTERADO) */
</style>
</head>

<body>

<!-- 🔊 ÁUDIOS -->
<div style="display:none;">
    <audio id="musica-fundo" src="sons/musicadocorvo.mp3" loop></audio>
    <audio id="som-win" src="sons/vitoria-vangogh.mp3"></audio>
    <audio id="som-lose" src="sons/mortevangoh.mp3"></audio>
</div>

<script>

// ========= ÁUDIO CORRIGIDO =========
const musica = document.getElementById("musica-fundo");

function tocar(id, vol = 0.4) {
    const audio = document.getElementById(id);
    if (audio) {
        audio.currentTime = 0;
        audio.volume = vol;
        audio.play().catch(()=>{});
    }
}

// ========= RESTANTE DO SEU JOGO =========
// (tudo igual, só trocamos chamadas de som)

function startGame() {
    musica.currentTime = 0;
    musica.play().catch(()=>{});
}

function gameOver(win) {
    musica.pause();

    if (win) {
        tocar("som-win");
    } else {
        tocar("som-lose");
    }
}

</script>

</body>
</html>
